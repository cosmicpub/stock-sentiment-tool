name: Auto AI Blog Generator

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Run profile"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - production
  schedule:
    # Morning production run
    - cron: "30 12 * * *"
    # Intraday production refreshes
    - cron: "30 14,16,18,20 * * 1-5"

jobs:
  generate-ai-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve profile and mode
        run: |
          # Defaults
          PROFILE="production"
          MODE="intraday"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ github.event.inputs.profile }}"
            MODE="morning"   # manual runs should generate clearly
          elif [ "${{ github.event.schedule }}" = "30 12 * * *" ]; then
            PROFILE="production"
            MODE="morning"
          else
            PROFILE="production"
            MODE="intraday"
          fi

          echo "PROFILE=$PROFILE" >> $GITHUB_ENV
          echo "BLOG_RUN_MODE=$MODE" >> $GITHUB_ENV

      - name: Set filters for TEST profile
        if: env.PROFILE == 'test'
        run: |
          echo "MORNING_POSTS=6" >> $GITHUB_ENV
          echo "INTRADAY_POSTS=2" >> $GITHUB_ENV
          echo "MAX_ARCHIVE_POSTS=120" >> $GITHUB_ENV
          echo "CANDIDATE_SCAN_LIMIT=80" >> $GITHUB_ENV
          echo "MIN_RELATED_MATCHES=0" >> $GITHUB_ENV
          echo "MIN_MENTIONS=1" >> $GITHUB_ENV
          echo "MIN_PRICE=10" >> $GITHUB_ENV
          echo "BLOG_MOCK=false" >> $GITHUB_ENV

      - name: Set filters for PRODUCTION profile
        if: env.PROFILE == 'production'
        run: |
          echo "MORNING_POSTS=6" >> $GITHUB_ENV
          echo "INTRADAY_POSTS=2" >> $GITHUB_ENV
          echo "MAX_ARCHIVE_POSTS=120" >> $GITHUB_ENV
          echo "CANDIDATE_SCAN_LIMIT=40" >> $GITHUB_ENV
          echo "MIN_RELATED_MATCHES=1" >> $GITHUB_ENV
          echo "MIN_MENTIONS=2" >> $GITHUB_ENV
          echo "MIN_PRICE=25" >> $GITHUB_ENV
          echo "BLOG_MOCK=false" >> $GITHUB_ENV

      - name: Generate AI blog pages
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"
          BLOG_RUN_MODE: ${{ env.BLOG_RUN_MODE }}
          MORNING_POSTS: ${{ env.MORNING_POSTS }}
          INTRADAY_POSTS: ${{ env.INTRADAY_POSTS }}
          MAX_ARCHIVE_POSTS: ${{ env.MAX_ARCHIVE_POSTS }}
          CANDIDATE_SCAN_LIMIT: ${{ env.CANDIDATE_SCAN_LIMIT }}
          MIN_RELATED_MATCHES: ${{ env.MIN_RELATED_MATCHES }}
          MIN_MENTIONS: ${{ env.MIN_MENTIONS }}
          MIN_PRICE: ${{ env.MIN_PRICE }}
          BLOG_MOCK: ${{ env.BLOG_MOCK }}
        run: python3 scripts/generate_ai_blog.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/*.html data/blog-manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh AI blog posts (${PROFILE}/${BLOG_RUN_MODE})"
            git push
          fi
