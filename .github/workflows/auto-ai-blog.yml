name: Auto AI Blog Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"
    - cron: "30 14,16,18,20 * * 1-5"

jobs:
  generate-ai-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set run mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 12 * * *" ]; then
            echo "BLOG_RUN_MODE=morning" >> $GITHUB_ENV
          else
            echo "BLOG_RUN_MODE=intraday" >> $GITHUB_ENV
          fi

      - name: Generate AI blog pages
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"
          BLOG_RUN_MODE: ${{ env.BLOG_RUN_MODE }}
          MORNING_POSTS: "6"
          INTRADAY_POSTS: "2"
          MAX_ARCHIVE_POSTS: "120"
          BLOG_MOCK: "false"
          CANDIDATE_SCAN_LIMIT: "40"
          MIN_RELATED_MATCHES: "1"
          MIN_MENTIONS: "2"
          MIN_PRICE: "25"
        run: python3 scripts/generate_ai_blog.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/*.html data/blog-manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh AI blog posts (${BLOG_RUN_MODE})"
            git push
          fi
