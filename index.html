<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Stock Sentiment Tool</title>
  <meta name="description" content="Analyze stock sentiment based on recent news headlines and market signals.">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6fb;
      color: #111;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 30px 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 60%;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      padding: 12px 18px;
      margin-left: 10px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      font-size: 20px;
      margin-top: 10px;
    }

    .bullish { color: green; }
    .bearish { color: red; }
    .mixed { color: #555; }

    ul {
      padding-left: 18px;
    }

    li {
      margin-bottom: 8px;
    }

    .disclaimer {
      font-size: 12px;
      color: #666;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Stock Sentiment Tool</h1>
  <p>Analyze how recent news may impact a stock</p>
</header>

<div class="container">

  <div class="card">
    <input id="tickerInput" type="text" placeholder="Enter ticker (e.g. AAPL)">
    <button onclick="runAnalysis()">Analyze</button>

    <div id="results"></div>
  </div>

  <div class="card">
    <h3>Recent Headlines</h3>
    <ul id="newsList"></ul>
  </div>

  <div class="disclaimer">
    This tool is for informational purposes only and does not constitute financial advice.
  </div>

</div>

<script>
  const positiveWords = [
    "beat", "beats", "growth", "strong", "surge",
    "record", "profit", "upgrade", "expands",
    "partnership", "raised"
  ];

  const negativeWords = [
    "miss", "lawsuit", "downgrade", "cuts",
    "decline", "weak", "investigation",
    "layoffs", "drop", "warning"
  ];

  function runAnalysis() {
    const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();
    const results = document.getElementById("results");
    const newsList = document.getElementById("newsList");

    if (!ticker) {
      results.innerHTML = "<p>Please enter a ticker.</p>";
      newsList.innerHTML = "";
      return;
    }

    // MOCK DATA (we replace this later with real API)
    const headlines = [
      `${ticker} beats earnings expectations in strong quarter`,
      `${ticker} expands partnership with major tech company`,
      `${ticker} faces lawsuit over product issues`
    ];

    let score = 0;

    headlines.forEach(headline => {
      const text = headline.toLowerCase();

      positiveWords.forEach(word => {
        if (text.includes(word)) score++;
      });

      negativeWords.forEach(word => {
        if (text.includes(word)) score--;
      });
    });

    let label = "Mixed";
    let className = "mixed";

    if (score > 2) {
      label = "Bullish";
      className = "bullish";
    } else if (score < -2) {
      label = "Bearish";
      className = "bearish";
    }

    results.innerHTML = `
      <h2>${ticker}</h2>
      <div class="result ${className}">
        ${label} (Score: ${score})
      </div>
      <p>Based on recent headlines and keyword analysis.</p>
    `;

    newsList.innerHTML = headlines.map(h => `<li>${h}</li>`).join("");
  }
</script>

</body>
</html>
