name: Auto AI Blog Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"

jobs:
  generate-ai-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Refresh market data from Finnhub
        env:
          MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}
        run: python scripts/build_data.py

      - name: Generate AI blog pages
        env:
          FINNHUB_API_KEY: ${{ secrets.MARKET_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          MAX_POSTS: "1"   # change to "6" after test passes
        run: python scripts/generate_ai_blog.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/*.html data/*.json
          git diff --cached --quiet || git commit -m "chore: refresh market data and generate AI blog posts"
          git push
